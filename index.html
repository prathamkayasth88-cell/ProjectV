<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h2 {
            color: #333;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: #666;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 500;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .captcha-container {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .captcha-box {
            flex: 1;
            height: 50px;
            background: #f8f9fa;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            letter-spacing: 3px;
            text-transform: uppercase;
            user-select: none;
        }

        .captcha-input {
            flex: 1;
        }

        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.3s ease;
        }

        .refresh-btn:hover {
            background: #5a67d8;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error {
            color: #e53e3e;
            font-size: 0.9rem;
            margin-top: 0.5rem;
            display: none;
        }

        .success {
            color: #38a169;
            font-size: 0.9rem;
            margin-top: 0.5rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h2>Login</h2>
            <p>Please enter your credentials</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="form-group">
                <label for="captcha">CAPTCHA</label>
                <div class="captcha-container">
                    <div class="captcha-box" id="captchaCode"></div>
                    <button type="button" class="refresh-btn" id="refreshCaptcha">🔄</button>
                    <input type="text" id="captcha" name="captcha" class="captcha-input" placeholder="Enter CAPTCHA" maxlength="6" required>
                </div>
                <div class="error" id="captchaError">CAPTCHA is incorrect</div>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">Login</button>
            <div class="success" id="successMsg">Login successful!</div>
        </form>
    </div>

    <script>
        class LoginForm {
            constructor() {
                this.captchaCode = '';
                this.init();
            }

            init() {
                this.generateCaptcha();
                this.bindEvents();
            }

            generateCaptcha() {
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
                this.captchaCode = '';
                for (let i = 0; i < 6; i++) {
                    this.captchaCode += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                document.getElementById('captchaCode').textContent = this.captchaCode;
            }

            bindEvents() {
                // Refresh CAPTCHA
                document.getElementById('refreshCaptcha').addEventListener('click', () => {
                    this.generateCaptcha();
                    document.getElementById('captcha').value = '';
                    this.clearErrors();
                });

                // Form submission
                document.getElementById('loginForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.handleLogin();
                });
            }

            clearErrors() {
                document.getElementById('captchaError').style.display = 'none';
                document.getElementById('successMsg').style.display = 'none';
            }

            validateCaptcha(input) {
                return input.toUpperCase() === this.captchaCode;
            }

            handleLogin() {
                this.clearErrors();
                
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;
                const captcha = document.getElementById('captcha').value;

                if (!username || !password || !captcha) {
                    return;
                }

                const loginBtn = document.getElementById('loginBtn');
                loginBtn.disabled = true;
                loginBtn.textContent = 'Logging in...';

                // Simulate CAPTCHA validation
                setTimeout(() => {
                    if (!this.validateCaptcha(captcha)) {
                        document.getElementById('captchaError').style.display = 'block';
                        this.generateCaptcha();
                        document.getElementById('captcha').value = '';
                    } else {
                        // Simulate successful login
                        document.getElementById('successMsg').style.display = 'block';
                        document.getElementById('loginForm').style.display = 'none';
                        
                        // In a real app, you would send credentials to server
                        console.log('Login attempt:', { username, password: '***' });
                        
                        setTimeout(() => {
                            alert('Login successful! (Demo)\n\nUsername: ' + username);
                        }, 500);
                    }

                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Login';
                }, 1500);
            }
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', () => {
            new LoginForm();
        });
    </script>
</body>
</html>
